<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      background: #fff;
      color: #1a1a1a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1a2e; color: #e0e0e0; }
    }
    h1 { font-size: 18px; margin-bottom: 16px; color: #4a9eff; }
    label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      cursor: pointer;
      font-size: 15px;
    }
    label input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4a9eff;
    }
    .hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
      margin-left: 28px;
    }
    .saved { color: #4a9eff; font-size: 12px; margin-top: 12px; opacity: 0; transition: opacity 0.2s; }
    .saved.show { opacity: 1; }
  </style>
</head>
<body>
  <h1>Page to Markdown</h1>
  <label>
    <input type="checkbox" id="include-images" checked>
    Include images in output
  </label>
  <div class="hint">When enabled, content images are included as Markdown image references (![alt](url)).<br>Disable to extract text-only Markdown.</div>
  <div class="saved" id="saved">✓ Saved</div>
  <script src="options.js"></script>
</body>
</html>
